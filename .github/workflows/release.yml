name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example v0.1.33.
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease.
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows release package
    runs-on: [self-hosted, Windows, mystia-steward-companion]
    env:
      MYSTIA_REFERENCE_DIR: ${{ vars.MYSTIA_REFERENCE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Enable Corepack
        shell: pwsh
        run: corepack enable

      - name: Validate build references
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MYSTIA_REFERENCE_DIR)) {
            throw "Repository variable MYSTIA_REFERENCE_DIR must point to the self-hosted runner reference DLL directory."
          }

          $required = @(
            "BepInEx.Core.dll",
            "BepInEx.Unity.IL2CPP.dll",
            "0Harmony.dll",
            "Il2CppInterop.Runtime.dll",
            "Il2Cppmscorlib.dll",
            "UnityEngine.CoreModule.dll",
            "UnityEngine.IMGUIModule.dll",
            "UnityEngine.InputLegacyModule.dll"
          )

          foreach ($file in $required) {
            $path = Join-Path $env:MYSTIA_REFERENCE_DIR $file
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Missing build reference: $path"
            }
          }

      - name: Build release package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File mods\bepinex\tools\build-release.ps1 `
            -SkipPreflight `
            -ReferenceDir "$env:MYSTIA_REFERENCE_DIR"

      - name: Generate checksums
        shell: pwsh
        run: |
          $files = @(
            "mods/bepinex/dist/mystia-steward-companion-bepinex.zip"
          )

          $installerDir = "apps/companion/src-tauri/target/release/bundle/nsis"
          if (Test-Path -LiteralPath $installerDir) {
            $files += Get-ChildItem -LiteralPath $installerDir -Filter "*.exe" | ForEach-Object { $_.FullName }
          }

          $lines = foreach ($file in $files) {
            if (Test-Path -LiteralPath $file -PathType Leaf) {
              $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $file
              "$($hash.Hash.ToLowerInvariant())  $($hash.Path)"
            }
          }

          $lines | Set-Content -Encoding UTF8 -LiteralPath "checksums.txt"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            mods/bepinex/dist/mystia-steward-companion-bepinex.zip
            apps/companion/src-tauri/target/release/bundle/nsis/*.exe
            checksums.txt
